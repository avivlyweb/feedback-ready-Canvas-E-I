    <script>
      // Fix for sandboxed iframes where window.fetch or globalThis.fetch has only a getter and throws TypeError on assignment.
      (function() {
        try {
          let currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch with getter/setter:", e);
        }
        try {
          let currentFetch = globalThis.fetch;
          Object.defineProperty(globalThis, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch globalThis.fetch with getter/setter:", e);
        }
      })();
    </script>
